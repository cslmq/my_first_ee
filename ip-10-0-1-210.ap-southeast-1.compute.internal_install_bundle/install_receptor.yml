---
- hosts: all
  become: yes
  tasks:
    tasks:
    - name: Display ansible_host
      debug:
        msg: "{{ ansible_host }}"
    - name: Create the receptor user
      user:
        name: "{{ receptor_user }}"
        shell: /bin/bash
    - import_role:
        name: ansible.receptor.podman
    - import_role:
        name: ansible.receptor.setup
