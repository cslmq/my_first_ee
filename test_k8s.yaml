---
- name: Retrieve and Print Kubernetes Cluster Information
  hosts: localhost
  gather_facts: no
  vars:
    # kubeconfig_content: "{{ lookup('env', 'KUBECONFIG_CONTENT') }}" # Replace with your actual kubeconfig content or variable.
    kubeconfig_content: "{{ KUBECONFIG_CONTENT }}"

  tasks:
    # - name: Debug KUBECONFIG_CONTENT variable
    #   debug:
    #     var: kubeconfig_content

    - name: Verify AWS CLI availability
      command: aws --version
      register: aws_version_check
      ignore_errors: yes

    - name: Display AWS CLI version
      debug:
        var: aws_version_check.stdout

    - name: Test AWS credentials
      command: aws sts get-caller-identity
      register: aws_identity
      ignore_errors: yes

    - name: Show AWS identity
      debug:
        var: aws_identity.stdout

    - name: Save kubeconfig to a temporary file
      copy:
        content: "{{ kubeconfig_content }}"
        dest: "/tmp/kubeconfig"
        mode: 0600

    - name: Get Kubernetes Cluster Info
      kubernetes.core.k8s_cluster_info:
        kubeconfig: "/tmp/kubeconfig"
      register: cluster_info

    - name: Print the Kubernetes Cluster Info
      debug:
        var: cluster_info
